name: ChatService CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Start Kafka / Zookeeper / Redis
        run: docker compose up -d

      - name: Start MySQL
        run: |
          docker run -d \
            --name mysql \
            -e MYSQL_ROOT_PASSWORD=1234 \
            -e MYSQL_DATABASE=chatService_demo \
            -p 3306:3306 \
            mysql:8.0 \
            --character-set-server=utf8mb4 \
            --collation-server=utf8mb4_unicode_ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if docker exec mysql mysqladmin ping -h 127.0.0.1 -uroot -p1234 --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 5
          done
          echo "MySQL did not become ready in time"
          docker logs mysql
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..20}; do
            if docker exec redis redis-cli ping | grep PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis..."
            sleep 3
          done
          docker logs redis
          exit 1

      - name: Wait for Kafka
        run: |
          for i in {1..30}; do
            if docker exec kafka kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "Kafka is ready"
              exit 0
            fi
            echo "Waiting for Kafka..."
            sleep 5
          done
          docker logs kafka
          exit 1

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build with demo profile
        run: ./gradlew clean build -Dspring.profiles.active=demo

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: chatservice-app
          path: build/libs/*.jar

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "===== ZOOKEEPER LOGS ====="
          docker logs zookeeper || true
          echo "===== KAFKA LOGS ====="
          docker logs kafka || true
          echo "===== REDIS LOGS ====="
          docker logs redis || true
          echo "===== MYSQL LOGS ====="
          docker logs mysql || true

      - name: Shutdown containers
        if: always()
        run: |
          docker compose down -v || true
          docker rm -f mysql || true
