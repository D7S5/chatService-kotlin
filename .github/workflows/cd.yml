name: CD Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar -x test

      - name: Check required secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "EC2_HOST is empty" && exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "EC2_USER is empty" && exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "EC2_SSH_KEY is empty" && exit 1)
          [ -n "${{ secrets.APP_DIR }}" ] || (echo "APP_DIR is empty" && exit 1)

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "echo connected"

      - name: Ensure app directory exists on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p '${{ secrets.APP_DIR }}'"

      - name: Upload jar to EC2
        run: |
          scp -i ~/.ssh/ec2_key.pem build/libs/*.jar "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.APP_DIR }}/app.jar"

      - name: Write .env on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            printf '%s\n' \
            'DB_URL=${{ secrets.DB_URL }}' \
            'DB_USERNAME=${{ secrets.DB_USERNAME }}' \
            'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' \
            'JWT_SECRET=${{ secrets.JWT_SECRET }}' \
            'GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}' \
            'GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}' \
            'NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}' \
            'NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}' \
            'KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}' \
            'KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}' \
            > "${{ secrets.APP_DIR }}/.env"
            chmod 600 "${{ secrets.APP_DIR }}/.env"
          EOF

      - name: Stop old app
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            pkill -f 'java.*app.jar' || true
          EOF

      - name: Start new app
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            cd "${{ secrets.APP_DIR }}"
            nohup java -Dspring.profiles.active=prod -jar app.jar > app.log 2>&1 < /dev/null &
          EOF

      - name: Check deploy result
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            sleep 8
            tail -n 50 "${{ secrets.APP_DIR }}/app.log"
          EOF