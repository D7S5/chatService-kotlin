apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: chat-virtualservice
  namespace: chat
spec:
  hosts:
    - "*"
  gateways:
    - chat-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: chat-service
            port:
              number: 80